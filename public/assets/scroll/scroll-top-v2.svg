<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 130" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- ═══ Laque rouge du corps (cylindre éclairé par le haut) ═══ -->
    <linearGradient id="lacquer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#4A0501"/>
      <stop offset="18%" stop-color="#8C0902"/>
      <stop offset="42%" stop-color="#C13B22"/>
      <stop offset="55%" stop-color="#B14A36"/>
      <stop offset="78%" stop-color="#7A0B02"/>
      <stop offset="100%" stop-color="#330301"/>
    </linearGradient>

    <!-- ═══ Reflet spéculaire de la laque ═══ -->
    <linearGradient id="spec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFE9B8" stop-opacity="0"/>
      <stop offset="45%" stop-color="#FFE9B8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFE9B8" stop-opacity="0"/>
    </linearGradient>

    <!-- ═══ Jade vert des embouts ═══ -->
    <radialGradient id="jade" cx="35%" cy="30%" r="85%">
      <stop offset="0%"  stop-color="#9BC98F"/>
      <stop offset="40%" stop-color="#5E8C4A"/>
      <stop offset="75%" stop-color="#3A5E2C"/>
      <stop offset="100%" stop-color="#1F3517"/>
    </radialGradient>
    <linearGradient id="jadeCyl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2C4720"/>
      <stop offset="30%" stop-color="#6B9A55"/>
      <stop offset="50%" stop-color="#83B26B"/>
      <stop offset="70%" stop-color="#4E7A3B"/>
      <stop offset="100%" stop-color="#1F3517"/>
    </linearGradient>

    <!-- ═══ Collerette or entre jade et laque ═══ -->
    <linearGradient id="goldRing" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#7A5217"/>
      <stop offset="35%" stop-color="#F0C75E"/>
      <stop offset="55%" stop-color="#E6A341"/>
      <stop offset="100%" stop-color="#5C3D10"/>
    </linearGradient>

    <!-- ═══ Motif karakusa (volutes de nuages japonaises) en or ═══ -->
    <pattern id="kumo" width="170" height="90" patternUnits="userSpaceOnUse" x="20" y="20">
      <g fill="none" stroke="#E6A341" stroke-width="3.2" stroke-linecap="round" opacity="0.9">
        <!-- Grande volute centrale -->
        <path d="M14 45 q20 -28 46 -16 q24 12 12 32 q-9 16 -25 8 q-13 -7 -6 -18 q5 -9 14 -5"/>
        <!-- Volute miroir -->
        <path d="M90 45 q18 26 44 16 q23 -10 13 -30 q-8 -16 -24 -9 q-13 6 -7 17 q5 9 14 5"/>
        <!-- Nuages stylisés haut et bas (dans la bande, non coupés) -->
        <path d="M52 16 q10 -7 20 -1 q7 4 2 10"/>
        <path d="M118 74 q10 7 20 1 q7 -4 2 -10"/>
        <path d="M150 30 q8 -6 16 0"/>
        <path d="M4 66 q8 6 16 0"/>
      </g>
      <!-- Points dorés -->
      <circle cx="40" cy="24" r="2.8" fill="#F0C75E"/>
      <circle cx="128" cy="66" r="2.8" fill="#F0C75E"/>
      <circle cx="86" cy="45" r="2.2" fill="#F0C75E"/>
    </pattern>

    <!-- Masque pour que le motif suive l'ombrage du cylindre -->
    <linearGradient id="motifFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="30%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.1"/>
    </linearGradient>
    <mask id="cylMask">
      <rect x="100" y="20" width="1000" height="90" rx="45" fill="url(#motifFade)"/>
    </mask>

    <!-- Ombre portée douce -->
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#210100" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- ═══════════ CORPS DU ROULEAU ═══════════ -->
  <g filter="url(#soft)">
    <!-- Cylindre laqué -->
    <rect x="100" y="20" width="1000" height="90" rx="45" fill="url(#lacquer)"/>
    <!-- Motifs dorés -->
    <rect x="100" y="20" width="1000" height="90" rx="45" fill="url(#kumo)" mask="url(#cylMask)"/>
    <!-- Liseré sombre de définition -->
    <rect x="100" y="20" width="1000" height="90" rx="45" fill="none" stroke="#210100" stroke-width="2" opacity="0.55"/>
    <!-- Reflet spéculaire de laque -->
    <rect x="150" y="33" width="900" height="11" rx="5.5" fill="url(#spec)" opacity="0.8"/>
    <!-- Reflet secondaire bas (lumière réfléchie) -->
    <rect x="130" y="92" width="940" height="5" rx="2.5" fill="#E6A341" opacity="0.18"/>

    <!-- ═══ Collerettes or ═══ -->
    <rect x="92"  y="22" width="14" height="86" rx="6" fill="url(#goldRing)"/>
    <rect x="1094" y="22" width="14" height="86" rx="6" fill="url(#goldRing)"/>

    <!-- ═══ EMBOUT GAUCHE (jade) ═══ -->
    <!-- Tige -->
    <rect x="48" y="36" width="46" height="58" fill="url(#jadeCyl)"/>
    <!-- Pommeau -->
    <ellipse cx="40" cy="65" rx="26" ry="34" fill="url(#jade)"/>
    <!-- Anneau or sur le pommeau -->
    <ellipse cx="40" cy="65" rx="26" ry="34" fill="none" stroke="#E6A341" stroke-width="2.5" opacity="0.7"/>
    <!-- Petit motif nuage gravé -->
    <path d="M30 58 q8 -8 16 -2 q6 5 1 11 q-4 5 -10 2" fill="none" stroke="#F0C75E" stroke-width="2" opacity="0.7"/>
    <path d="M33 76 q7 5 13 0" fill="none" stroke="#F0C75E" stroke-width="2" opacity="0.55"/>
    <!-- Reflet du jade -->
    <ellipse cx="32" cy="50" rx="8" ry="12" fill="#C9E5BD" opacity="0.5"/>

    <!-- ═══ EMBOUT DROIT (jade) ═══ -->
    <rect x="1106" y="36" width="46" height="58" fill="url(#jadeCyl)"/>
    <ellipse cx="1160" cy="65" rx="26" ry="34" fill="url(#jade)"/>
    <ellipse cx="1160" cy="65" rx="26" ry="34" fill="none" stroke="#E6A341" stroke-width="2.5" opacity="0.7"/>
    <path d="M1150 58 q8 -8 16 -2 q6 5 1 11 q-4 5 -10 2" fill="none" stroke="#F0C75E" stroke-width="2" opacity="0.7"/>
    <path d="M1153 76 q7 5 13 0" fill="none" stroke="#F0C75E" stroke-width="2" opacity="0.55"/>
    <ellipse cx="1152" cy="50" rx="8" ry="12" fill="#C9E5BD" opacity="0.5"/>
  </g>
</svg>
